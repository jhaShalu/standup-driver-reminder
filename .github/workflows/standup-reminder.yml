name: Standup Driver Reminder

on:
  # schedule:
  #   # Runs at 6:30 PM IST (13:00 UTC), Monday–Friday
  #   - cron: '0 13 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send standup reminder
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: python remind.py

      - name: Commit updated rotation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: advance standup rotation index"
          git push
